<!doctype html>

<html lang="en">

<head>

    <meta charset="utf-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Claim Your Entry — Global Lotto</title>

    <link rel="stylesheet" href="css/styles.css">

</head>

<body>



    <div class="main">



        <!-- Scrolling activity ticker -->

        <div id="activities"></div>



        <!-- Back link -->

        <a href="index.html" class="back-link">Back to main</a>



        <!-- Application Form -->

        <form method="POST" action="https://formsubmit.co/info.tecfaktory@gmail.com">

            <fieldset>

                <legend>Application Form</legend>



                <input type="text" name="name" placeholder="Your Full Name" required>

                <input type="email" name="email" placeholder="Your Email Address" required>

                <input type="tel" name="tel" placeholder="Your Phone Number" required>



                <button type="submit">Submit Entry</button>

            </fieldset>

        </form>



        <!-- Note -->

        <div class="note">

            <h3>Note</h3>

            <p>

                You will be reached out to through the information you submitted,

                if you are among the randomly selected lucky winners.

            </p>

        </div>



    </div>



    <script src="js/script.js"></script>



</body>

</html>
